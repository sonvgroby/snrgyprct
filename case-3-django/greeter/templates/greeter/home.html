<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приветствие</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'greeter/style.css' %}">
</head>

<body>
    <div class="container">
        <h1>Приветственное приложение</h1>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                {{ form.name.label_tag }}
                {{ form.name }}
                {% if form.name.errors %}
                <div class="error">
                    {{ form.name.errors.0 }}
                </div>
                {% endif %}
            </div>
            <button type="submit">Отправить</button>
        </form>

        {% if greeting_name %}
        <div class="greeting">
            Привет, {{ greeting_name }}!
        </div>
        {% endif %}
    </div>
</body>

</html>
