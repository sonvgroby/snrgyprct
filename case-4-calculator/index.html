<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Калькулятор</h1>

    <input type="text" id="num1" placeholder="Введите первое число" />
    <input type="text" id="num2" placeholder="Введите второе число" />

    <div class="buttons">
      <button id="sumBtn">Сумма</button>
      <button id="subBtn">Разность</button>
      <button id="mulBtn">Произведение</button>
      <button id="divBtn">Деление</button>
    </div>

    <div id="result" class="result">Результат:</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
